<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه تست شبکه ۶G</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .form-group input, .form-group select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .result-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0,0,0.1);
            text-align: center;
        }
        .result-card h3 {
            margin: 0 0 10px 0;
            color: #666;
            font-size: 14px;
        }
        .result-card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #performanceChart {
            margin-top: 30px;
            max-height: 400px;
        }
    </style>
</head>
<body>
    <header class="app-header">
      <div class="brand">
        <span class="logo">⬡</span>
        <h1>6G Fabric Dashboard</h1>
      </div>
      <div class="header-actions">
        <a class="btn" href="scenario.html">🗺️ سناریوی شبیه‌سازی</a>
        <a class="btn" href="index.html">⬅ بازگشت به داشبورد</a>
      </div>
    </header>

    <div class="test-container">
        <h1>🧪 تست عملکرد شبکه Hyperledger Fabric</h1>

        <div class="form-grid">
            <div class="form-group">
                <label>ابزار تست:</label>
                <select id="toolSelect">
                    <option value="caliper">Hyperledger Caliper</option>
                    <option value="tape">Tape</option>
                </select>
            </div>

            <div class="form-group">
                <label>سناریوی تست:</label>
                <select id="scenarioSelect">
                    <option value="RegisterIoT">ثبت IoT Device</option>
                    <option value="RegisterUser">ثبت کاربر</option>
                <option value="QueryIoT">Query IoT</option>
                    <option value="UpdateIoT">به‌روزرسانی IoT</option>
                    <option value="RevokeIoT">لغو IoT</option>
                </select>
            </div>

            <div class="form-group">
                <label>کانال:</label>
                <select id="channelSelect"></select>
            </div>

            <div class="form-group">
                <label>Chaincode:</label>
                <select id="chaincodeSelect"></select>
            </div>

            <div class="form-group">
                <label>تعداد IoT Devices:</label>
                <input type="number" id="iotCount" value="100" min="1" max="1000">
            </div>

            <div class="form-group">
                <label>تعداد Users:</label>
                <input type="number" id="userCount" value="50" min="1" max="5000">
            </div>

            <div class="form-group">
                <label>TPS Target:</label>
                <input type="number" id="tpsTarget" value="100" min="1" max="1000">
            </div>

            <div class="form-group">
                <label>مدت زمان (ثانیه):</label>
                <input type="number" id="duration" value="60" min="10" max="600">
            </div>

            <div class="form-group">
                <label>سازمان:</label>
                <select id="orgSelect"></select>
            </div>
        </div>

        <button id="runTestBtn" class="btn-primary">🚀 شروع تست</button>

        <div id="loadingSpinner" style="display:none;">
            <div class="spinner"></div>
            <p style="text-align:center;">در حال اجرای تست... لطفاً صبر کنید</p>
        </div>

        <div id="resultsSection" style="display:none; margin-top: 30px;">
            <h2>📊 نتایج تست</h2>
            <div class="results-grid">
                <div class="result-card">
                    <h3>TPS واقعی</h3>
                    <p id="resultTps">-</p>
                </div>
                <div class="result-card">
                    <h3>میانگین Latency (ms)</h3>
                    <p id="resultLatency">-</p>
                </div>
                <div class="result-card">
                    <h3>Success Rate</h3>
                    <p id="resultSuccess">-</p>
                </div>
                <div class="result-card">
                    <h3>Failed Transactions</h3>
                <p id="resultFailed">-</p>
                </div>
            </div>
            <canvas id="performanceChart"></canvas>
        </div>
    </div>

    <script src="test-app.js"></script>
</body>
</html>
