version: '3.8'
networks:
  6g-network:
    external: true
services:
  rca-main:
    image: hyperledger/fabric-ca:1.5
    container_name: rca-main
    hostname: rca-main
    ports:
      - "7054:7054"
    environment:
      - FABRIC_CA_SERVER_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CA_NAME=rca-main
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_TLS_CERTFILE=/etc/hyperledger/fabric-ca-server/tls/server.crt
      - FABRIC_CA_SERVER_TLS_KEYFILE=/etc/hyperledger/fabric-ca-server/tls/server.key
    volumes:
      - ./crypto-config/intermediate-ca:/etc/hyperledger/fabric-ca-server
    command: >
      sh -c '
        rm -f /etc/hyperledger/fabric-ca-server/fabric-ca-server-config.yaml
        rm -f /etc/hyperledger/fabric-ca-server/ca-cert.pem
        rm -f /etc/hyperledger/fabric-ca-server/ca-chain.pem
        rm -f /etc/hyperledger/fabric-ca-server/fabric-ca-server.db
        rm -rf /etc/hyperledger/fabric-ca-server/msp
        fabric-ca-server start
          -b admin:adminpw
          --registry.maxenrollments -1
          --intermediate.parentserver.url https://admin:adminpw@root-ca:7052
          --intermediate.parentserver.caname root-ca
          --intermediate.tls.certfiles /etc/hyperledger/fabric-ca-server/tls/ca.crt
      '
    networks:
      - 6g-network
    restart: unless-stopped
