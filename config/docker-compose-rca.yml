version: '3.7'

networks:
  6g-network:
    external: true

services:
  rca-orderer:
    image: hyperledger/fabric-ca:1.5.7
    container_name: rca-orderer
    environment:
      - FABRIC_CA_SERVER_CA_NAME=rca-orderer
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server/ca/cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server/ca/priv_sk
      - FABRIC_CA_SERVER_CSR_CN=rca-orderer.example.com
      - FABRIC_CA_SERVER_CSR_OU=orderer
    volumes:
      - ./crypto-config/ordererOrganizations/example.com/rca/intermediate-msp/signcerts/cert.pem:/etc/hyperledger/fabric-ca-server/ca/cert.pem
      - ./crypto-config/ordererOrganizations/example.com/rca/intermediate-msp/keystore/priv_sk:/etc/hyperledger/fabric-ca-server/ca/priv_sk
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw --registry.maxenrollments -1 -d'
    networks:
      - 6g-network

  rca-org1:
    image: hyperledger/fabric-ca:1.5.7
    container_name: rca-org1
    environment:
      - FABRIC_CA_SERVER_CA_NAME=rca-org1
