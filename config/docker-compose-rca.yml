      - FABRIC_CA_SERVER_CSR_CN=rca-org1.org1.example.com
      - FABRIC_CA_SERVER_CSR_OU=peer
    volumes:
      - ./crypto-config/peerOrganizations/org1.example.com/rca/intermediate-msp/signcerts/cert.pem:/etc/hyperledger/fabric-ca-server/ca/cert.pem
