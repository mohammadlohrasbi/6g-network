version: '3.7'

networks:
  6g-network:
    external: true

services:
  root-ca:
    container_name: root-ca
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=root-ca
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7052
    ports:
      - "7052:7052"
    volumes:
      - ./crypto-config/root-ca:/etc/hyperledger/fabric-ca-server
    command: fabric-ca-server start
    networks:
      - 6g-network
    restart: unless-stopped
